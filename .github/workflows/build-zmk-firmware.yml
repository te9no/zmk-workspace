name: 🧭 Build ZMK firmware

on:
  workflow_call:
    inputs:
      target:
        description: "Regex matched against artifact-name, board, shield, and snippet. Use 'all' for every target."
        type: string
        required: false
        default: "all"
      commit_firmware:
        description: "Commit built firmware files back to the caller branch."
        type: boolean
        required: false
        default: true
      build_yaml:
        description: "Path to the ZMK build matrix file."
        type: string
        required: false
        default: "build.yaml"
      firmware_folder:
        description: "Folder used by the publish job for merged firmware outputs."
        type: string
        required: false
        default: "firmware"
      update_build_health:
        description: "Write build health badge files back to the caller branch."
        type: boolean
        required: false
        default: false
      badge_folder:
        description: "Folder used for generated build health badge files."
        type: string
        required: false
        default: "badges/build-health"
      container_image:
        description: "Container image used for west/ZMK builds."
        type: string
        required: false
        default: "zmkfirmware/zmk-build-arm:stable"
      max_parallel:
        description: "Maximum number of matrix builds to run in parallel."
        type: number
        required: false
        default: 4
      tool_repository:
        description: "Repository that contains .github/scripts/compose-build-matrix.rb."
        type: string
        required: false
        default: "te9no/zmk-workspace"
      tool_ref:
        description: "Git ref of tool_repository to use."
        type: string
        required: false
        default: "main"
      matrix_script_path:
        description: "Path to the matrix composer script inside tool_repository."
        type: string
        required: false
        default: ".github/scripts/compose-build-matrix.rb"
      fail_on_no_targets:
        description: "Fail when the target filter selects no build targets."
        type: boolean
        required: false
        default: false
    outputs:
      has_targets:
        description: "Whether the build matrix selected at least one target."
        value: ${{ jobs.matrix.outputs.has_targets }}
      matrix:
        description: "Generated build matrix JSON."
        value: ${{ jobs.matrix.outputs.matrix }}

permissions:
  contents: write
  actions: read

concurrency:
  group: zmk-firmware-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  matrix:
    runs-on: ubuntu-latest
    name: 🧭 Compose build constellation
    outputs:
      matrix: ${{ steps.compose.outputs.matrix }}
      has_targets: ${{ steps.compose.outputs.has_targets }}
    steps:
      - name: 📥 Checkout config repository
        uses: actions/checkout@v4

      - name: 🧰 Checkout ZMK workspace tools
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.tool_repository }}
          ref: ${{ inputs.tool_ref }}
          path: .zmk-workspace-tools

      - name: 🗺️ Compose matrix from build.yaml
        id: compose
        env:
          TARGET: ${{ inputs.target }}
          BUILD_YAML: ${{ inputs.build_yaml }}
          MATRIX_SCRIPT: .zmk-workspace-tools/${{ inputs.matrix_script_path }}
        run: |
          set -euo pipefail
          if [ ! -f "$BUILD_YAML" ]; then
            echo "❌ Build matrix file not found: $BUILD_YAML" >&2
            exit 1
          fi
          if [ ! -f "$MATRIX_SCRIPT" ]; then
            echo "❌ Matrix composer script not found: $MATRIX_SCRIPT" >&2
            exit 1
          fi

          echo "🧭 Reading build matrix: $BUILD_YAML"
          echo "🎯 Target filter: $TARGET"
          matrix_json="$(ruby "$MATRIX_SCRIPT" "$BUILD_YAML" "$TARGET")"
          echo "matrix=${matrix_json}" >> "$GITHUB_OUTPUT"

          count="$(printf '%s' "$matrix_json" | ruby -rjson -e 'print JSON.parse(STDIN.read).fetch("include", []).length')"
          if [ "$count" -gt 0 ]; then
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
          fi

          echo "✨ Selected ${count} build target(s)."
          printf '%s' "$matrix_json" | ruby -rjson -e 'JSON.parse(STDIN.read).fetch("include", []).each { |t| puts "  🌟 #{t["artifact-name"] || [t["shield"], t["board"]].compact.join("-")}" }'

          if [ "$count" -eq 0 ] && [ "${{ inputs.fail_on_no_targets }}" = "true" ]; then
            echo "❌ No build targets selected." >&2
            exit 1
          fi

          {
            echo "## 🧭 Build Constellation"
            echo
            echo "- 🎯 Target filter: \`$TARGET\`"
            echo "- 📄 Matrix file: \`$BUILD_YAML\`"
            echo "- ✨ Selected targets: **$count**"
            echo
            echo "### 🌟 Targets"
            printf '%s' "$matrix_json" | ruby -rjson -e 'JSON.parse(STDIN.read).fetch("include", []).each { |t| puts "- 🌟 `#{t["artifact-name"] || [t["shield"], t["board"]].compact.join("-")}`" }'
          } >> "$GITHUB_STEP_SUMMARY"

  prepare-west:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.container_image }}
    needs: matrix
    if: needs.matrix.outputs.has_targets == 'true'
    name: 🧰 Prepare west workspace
    steps:
      - name: 📥 Checkout config repository
        uses: actions/checkout@v4

      - name: 🧭 Prepare workspace variables
        shell: bash
        run: |
          set -euo pipefail
          if [ -f zephyr/module.yml ]; then
            base_dir="$GITHUB_WORKSPACE/.west-workspace"
            rm -rf "$base_dir/config"
            mkdir -p "$base_dir/config"
            cp -R config/. "$base_dir/config/"
          else
            base_dir="$GITHUB_WORKSPACE"
          fi

          echo "base_dir=${base_dir}" >> "$GITHUB_ENV"
          echo "🧭 Base directory: $base_dir"

      - name: 🧊 Restore west workspace cache
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            ${{ env.base_dir }}/.west/
            ${{ env.base_dir }}/modules/
            ${{ env.base_dir }}/tools/
            ${{ env.base_dir }}/zephyr/
            ${{ env.base_dir }}/bootloader/
            ${{ env.base_dir }}/zmk/
          key: ${{ runner.os }}-west-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-west-

      - name: 🏗️ West init
        working-directory: ${{ env.base_dir }}
        run: |
          if [ ! -d .west ]; then
            echo "🏗️ Initializing west workspace"
            west init -l "${{ env.base_dir }}/config"
          else
            echo "✅ West workspace already initialized"
          fi

      - name: 🛰️ West update
        working-directory: ${{ env.base_dir }}
        run: |
          echo "🛰️ Updating west modules with partial clone fetch filter"
          west update --fetch-opt=--filter=tree:0

      - name: 📡 West Zephyr export
        working-directory: ${{ env.base_dir }}
        run: |
          echo "📡 Exporting Zephyr CMake package"
          west zephyr-export

  build:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.container_image }}
    needs:
      - matrix
      - prepare-west
    if: needs.matrix.outputs.has_targets == 'true'
    name: 🔨 Build ${{ matrix['artifact-name'] || matrix.shield || matrix.board }}
    strategy:
      fail-fast: false
      max-parallel: ${{ inputs.max_parallel }}
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - name: 📥 Checkout config repository
        uses: actions/checkout@v4

      - name: 🗂️ Create build directory
        run: |
          build_dir="$(mktemp -d)"
          echo "build_dir=$build_dir" >> "$GITHUB_ENV"
          echo "🗂️ Build directory: $build_dir"

      - name: 🧭 Prepare build variables
        shell: bash
        env:
          BOARD: ${{ matrix.board }}
          SHIELD: ${{ matrix.shield }}
          SNIPPET: ${{ matrix.snippet }}
          ARTIFACT_NAME: ${{ matrix['artifact-name'] }}
        run: |
          set -euo pipefail

          if [ -f zephyr/module.yml ]; then
            base_dir="$GITHUB_WORKSPACE/.west-workspace"
            rm -rf "$base_dir/config"
            mkdir -p "$base_dir/config"
            cp -R config/. "$base_dir/config/"
            zmk_load_arg="-DZMK_EXTRA_MODULES=${GITHUB_WORKSPACE}"
          else
            base_dir="$GITHUB_WORKSPACE"
            zmk_load_arg=""
          fi

          artifact_name="${ARTIFACT_NAME:-}"
          if [ -z "$artifact_name" ]; then
            artifact_name="${SHIELD:+${SHIELD}-}${BOARD}-zmk"
          fi
          artifact_name="$(printf '%s' "$artifact_name" | sed 's/[":<>|*?\\\/]/-/g')"
          display_name="${SHIELD:+${SHIELD} - }${BOARD}"

          echo "base_dir=${base_dir}" >> "$GITHUB_ENV"
          echo "zmk_load_arg=${zmk_load_arg}" >> "$GITHUB_ENV"
          echo "artifact_name=${artifact_name}" >> "$GITHUB_ENV"
          echo "display_name=${display_name}" >> "$GITHUB_ENV"
          echo "🎛️ Board: ${BOARD}"
          echo "🛡️ Shield: ${SHIELD:-none}"
          echo "🧩 Snippet: ${SNIPPET:-none}"
          echo "📦 Artifact: ${artifact_name}"

      - name: 🧊 Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            ${{ env.base_dir }}/.west/
            ${{ env.base_dir }}/modules/
            ${{ env.base_dir }}/tools/
            ${{ env.base_dir }}/zephyr/
            ${{ env.base_dir }}/bootloader/
            ${{ env.base_dir }}/zmk/
          key: ${{ runner.os }}-west-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-west-

      - name: ⚡ Cache ccache
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ github.ref_name }}-${{ hashFiles('config/west.yml', 'build.yaml', 'config/**/*.conf', 'config/**/*.keymap', 'boards/**/*.conf', 'boards/**/*.overlay', 'boards/**/*.dtsi', 'snippets/**/*.conf', 'snippets/**/*.overlay', 'zephyr/module.yml') }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-ccache-

      - name: 🏗️ West init
        working-directory: ${{ env.base_dir }}
        run: |
          if [ ! -d .west ]; then
            echo "🏗️ Initializing west workspace"
            west init -l "${{ env.base_dir }}/config"
          else
            echo "✅ West workspace already initialized"
          fi

      - name: 🛰️ West update
        working-directory: ${{ env.base_dir }}
        run: |
          echo "🛰️ Updating west modules"
          west update --fetch-opt=--filter=tree:0

      - name: 📡 West Zephyr export
        working-directory: ${{ env.base_dir }}
        run: |
          echo "📡 Exporting Zephyr CMake package"
          west zephyr-export

      - name: ⚡ Prepare ccache
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.ccache"
          echo "⚡ Resetting ccache statistics"
          ccache -z || true
          ccache -s || true

      - name: 🔨 West build (${{ env.display_name }})
        working-directory: ${{ env.base_dir }}
        shell: bash
        env:
          BOARD: ${{ matrix.board }}
          SHIELD: ${{ matrix.shield }}
          SNIPPET: ${{ matrix.snippet }}
          CMAKE_ARGS: ${{ matrix['cmake-args'] }}
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CCACHE_MAXSIZE: 2G
          CCACHE_COMPILERCHECK: content
          CCACHE_IGNOREOPTIONS: --specs=picolibc.specs
        run: |
          set -euo pipefail

          west_args=()
          if [ -n "${SNIPPET:-}" ]; then
            west_args=(-S "$SNIPPET")
          fi

          shield_args=()
          if [ -n "${SHIELD:-}" ]; then
            shield_args=(-DSHIELD="$SHIELD")
          fi

          zmk_load_args=()
          if [ -n "${zmk_load_arg:-}" ]; then
            zmk_load_args=("$zmk_load_arg")
          fi

          echo "🚀 Starting ZMK build"
          echo "🎛️ BOARD=$BOARD"
          echo "🛡️ SHIELD=${SHIELD:-none}"
          echo "🧩 SNIPPET=${SNIPPET:-none}"
          echo "🧱 CMAKE_ARGS=${CMAKE_ARGS:-none}"

          # shellcheck disable=SC2086
          west build \
            -s zmk/app \
            -d "$build_dir" \
            -b "$BOARD" \
            "${west_args[@]}" \
            -- \
            -DZMK_CONFIG="$base_dir/config" \
            "${shield_args[@]}" \
            "${zmk_load_args[@]}" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            ${CMAKE_ARGS:-}

      - name: 📊 ccache statistics
        if: ${{ !cancelled() }}
        run: ccache -s || true

      - name: 🧾 Kconfig output (${{ env.display_name }})
        if: ${{ !cancelled() }}
        run: |
          if [ -f "${{ env.build_dir }}/zephyr/.config" ]; then
            grep -v -e '^#' -e '^$' "${{ env.build_dir }}/zephyr/.config" | sort
          else
            echo "⚠️ No Kconfig output"
          fi

      - name: 🌳 Devicetree output (${{ env.display_name }})
        if: ${{ !cancelled() }}
        run: |
          if [ -f "${{ env.build_dir }}/zephyr/zephyr.dts" ]; then
            cat "${{ env.build_dir }}/zephyr/zephyr.dts"
          elif [ -f "${{ env.build_dir }}/zephyr/zephyr.dts.pre" ]; then
            cat -s "${{ env.build_dir }}/zephyr/zephyr.dts.pre"
          else
            echo "⚠️ No Devicetree output"
          fi

      - name: 📦 Collect firmware
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ env.build_dir }}/artifacts"
          if [ -f "${{ env.build_dir }}/zephyr/zmk.uf2" ]; then
            cp "${{ env.build_dir }}/zephyr/zmk.uf2" "${{ env.build_dir }}/artifacts/${{ env.artifact_name }}.uf2"
            echo "📦 Collected UF2: ${{ env.artifact_name }}.uf2"
          elif [ -f "${{ env.build_dir }}/zephyr/zmk.bin" ]; then
            cp "${{ env.build_dir }}/zephyr/zmk.bin" "${{ env.build_dir }}/artifacts/${{ env.artifact_name }}.bin"
            echo "📦 Collected BIN: ${{ env.artifact_name }}.bin"
          else
            echo "❌ No firmware output found" >&2
            exit 1
          fi

      - name: ⬆️ Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ env.artifact_name }}
          path: ${{ env.build_dir }}/artifacts/*

  publish:
    runs-on: ubuntu-latest
    needs:
      - matrix
      - build
    if: ${{ always() && needs.matrix.outputs.has_targets == 'true' && needs.build.result != 'cancelled' }}
    steps:
      - name: 📥 Checkout config repository
        uses: actions/checkout@v4

      - name: 🔄 Sync caller branch before firmware publish
        if: ${{ startsWith(github.ref, 'refs/heads/') }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "$GITHUB_REF_NAME"
          git checkout -B "$GITHUB_REF_NAME" "origin/$GITHUB_REF_NAME"

      - name: 🧭 Get repository and branch names
        id: output-path
        shell: bash
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          if [ "$branch" = "$GITHUB_REF" ]; then
            branch="${GITHUB_REF_NAME}"
          fi
          repo="${GITHUB_REPOSITORY#*/}"
          safe_repo="$(printf '%s' "$repo" | sed 's/[":<>|*?\\\/]/-/g')"
          safe_branch="$(printf '%s' "$branch" | sed 's/[":<>|*?\\\/]/-/g')"
          firmware_dir="${{ inputs.firmware_folder }}/${safe_repo}/${safe_branch}"
          echo "repo=${repo}" >> "$GITHUB_OUTPUT"
          echo "safe_repo=${safe_repo}" >> "$GITHUB_OUTPUT"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"
          echo "safe_branch=${safe_branch}" >> "$GITHUB_OUTPUT"
          echo "firmware_dir=${firmware_dir}" >> "$GITHUB_OUTPUT"
          echo "📦 Repository: $repo"
          echo "🧼 Safe repository: $safe_repo"
          echo "🧭 Branch: $branch"
          echo "🧼 Safe branch: $safe_branch"
          echo "📁 Firmware directory: $firmware_dir"

      - name: 🗂️ Prepare firmware directory
        run: |
          mkdir -p "${{ steps.output-path.outputs.firmware_dir }}"
          rm -rf "${{ steps.output-path.outputs.firmware_dir }}"/*
          echo "🗂️ Firmware directory: ${{ steps.output-path.outputs.firmware_dir }}"

      - name: ⬇️ Download firmware artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: ${{ steps.output-path.outputs.firmware_dir }}
          pattern: artifact-*
          merge-multiple: true

      - name: 🔍 Check downloaded firmware
        id: firmware-files
        run: |
          count="$(find "${{ steps.output-path.outputs.firmware_dir }}" -type f | wc -l)"
          echo "count=${count}" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            echo "✅ Downloaded ${count} firmware file(s)."
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ No successful firmware artifacts were found."
          fi
          {
            echo "## 📦 Firmware Publish"
            echo
            echo "- 📦 Repository: \`${{ steps.output-path.outputs.repo }}\`"
            echo "- 🧼 Safe repository: \`${{ steps.output-path.outputs.safe_repo }}\`"
            echo "- 🧭 Branch: \`${{ steps.output-path.outputs.branch }}\`"
            echo "- 🧼 Safe branch: \`${{ steps.output-path.outputs.safe_branch }}\`"
            echo "- 📁 Folder: \`${{ steps.output-path.outputs.firmware_dir }}\`"
            echo "- 📦 Firmware files: **${count}**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 💾 Commit firmware
        if: steps.firmware-files.outputs.has_files == 'true' && inputs.commit_firmware == true
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: ${{ inputs.firmware_folder }}/**/*
          commit_message: Update firmware files for ${{ steps.output-path.outputs.repo }} ${{ steps.output-path.outputs.branch }}
          commit_options: --no-verify
          push_options: --no-verify

      - name: 🎁 Upload merged firmware
        if: steps.firmware-files.outputs.has_files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.output-path.outputs.safe_repo }}-${{ steps.output-path.outputs.safe_branch }}
          path: ${{ steps.output-path.outputs.firmware_dir }}/*

  build-health:
    runs-on: ubuntu-latest
    needs:
      - matrix
      - build
      - publish
    if: ${{ always() && inputs.update_build_health == true && needs.matrix.outputs.has_targets == 'true' }}
    steps:
      - name: 📥 Checkout config repository
        uses: actions/checkout@v4

      - name: 🔄 Sync caller branch after firmware publish
        if: ${{ startsWith(github.ref, 'refs/heads/') }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "$GITHUB_REF_NAME"
          git checkout -B "$GITHUB_REF_NAME" "origin/$GITHUB_REF_NAME"

      - name: 🧰 Checkout ZMK workspace tools
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.tool_repository }}
          ref: ${{ inputs.tool_ref }}
          path: .zmk-workspace-tools

      - name: 🩺 Write build health badge
        id: write
        shell: bash
        env:
          STATUS: ${{ needs.build.result }}
          TARGET: ${{ inputs.target }}
          BADGE_FOLDER: ${{ inputs.badge_folder }}
          SCRIPT: .zmk-workspace-tools/.github/scripts/write-build-health-badge.py
        run: |
          set -euo pipefail
          python3 "$SCRIPT" \
            --status "$STATUS" \
            --target "$TARGET" \
            --repo "$GITHUB_REPOSITORY" \
            --branch "$GITHUB_REF_NAME" \
            --sha "$GITHUB_SHA" \
            --run-id "$GITHUB_RUN_ID" \
            --run-number "$GITHUB_RUN_NUMBER" \
            --server-url "$GITHUB_SERVER_URL" \
            --folder "$BADGE_FOLDER" \
            --github-output "$GITHUB_OUTPUT" \
            --github-summary "$GITHUB_STEP_SUMMARY"

      - name: 💾 Commit build health badge
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: ${{ inputs.badge_folder }}/**/*
          commit_message: Update build health badge
          commit_options: --no-verify
          push_options: --no-verify

      - name: 🎁 Upload build health badge
        uses: actions/upload-artifact@v4
        with:
          name: build-health-badge
          path: ${{ steps.write.outputs.badge_dir }}/*
