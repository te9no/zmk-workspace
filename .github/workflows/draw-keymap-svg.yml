name: Draw physical-layout keymap SVGs

on:
  workflow_call:
    inputs:
      commit_message:
        description: 'Commit message for updated SVGs. Ignored if amend_commit is true.'
        type: string
        required: false
        default: 'keymap-svg render'
      amend_commit:
        description: 'Whether to amend the last commit instead of creating a new one.'
        type: boolean
        required: false
        default: false
      keymap_patterns:
        description: 'Path specification for ZMK keymap files.'
        type: string
        required: false
        default: 'config/*.keymap'
      layout_search_path:
        description: 'Path to search for matching .dtsi/.overlay physical layout files.'
        type: string
        required: false
        default: '.'
      output_folder:
        description: 'Output folder for generated SVG files.'
        type: string
        required: false
        default: 'keymap-svg'
      destination:
        description: 'Add output files to a commit, artifacts, or both. Values: commit, artifact, both.'
        type: string
        required: false
        default: 'commit'
      artifact_name:
        description: 'Name of the produced artifact containing SVG outputs. Ignored if destination is commit.'
        type: string
        required: false
        default: 'keymap-svg'
      tool_repository:
        description: 'Repository that contains scripts/generate_physical_layout_svg.py.'
        type: string
        required: false
        default: 'te9no/zmk-workspace'
      tool_ref:
        description: 'Git ref of tool_repository to use.'
        type: string
        required: false
        default: 'main'
      script_path:
        description: 'Path to the generator script inside tool_repository.'
        type: string
        required: false
        default: 'scripts/generate_physical_layout_svg.py'
      fail_on_error:
        description: 'Fail the action if any keymap cannot be rendered.'
        type: boolean
        required: false
        default: true
    outputs:
      drawings:
        description: 'Artifact id for uploaded SVG outputs.'
        value: ${{ jobs.draw.outputs.drawings }}

jobs:
  draw:
    runs-on: ubuntu-latest
    outputs:
      drawings: ${{ steps.artifact-upload-step.outputs.artifact-id }}
    steps:
      - name: Checkout config repository
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ (inputs.amend_commit == true && 2) || 1 }}
          submodules: recursive

      - name: Checkout keymap-svg tools
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.tool_repository }}
          ref: ${{ inputs.tool_ref }}
          path: .keymap-svg-tools

      - name: Draw keymap SVGs
        id: draw
        continue-on-error: ${{ !inputs.fail_on_error }}
        shell: bash
        run: |
          set -uo pipefail
          shopt -s nullglob

          script=".keymap-svg-tools/${{ inputs.script_path }}"
          if [[ ! -f "$script" ]]; then
            echo "ERROR: Generator script not found: $script" >&2
            exit 1
          fi

          mkdir -p "${{ inputs.output_folder }}"
          artifacts=()
          found=0
          error_occurred=0

          for keymap in ${{ inputs.keymap_patterns }}; do
            found=1
            keyboard="$(basename -s .keymap "$keymap")"
            dtsi_file="$(find "${{ inputs.layout_search_path }}" -path '*/.git' -prune -o -type f \( -name "$keyboard.dtsi" -o -name "$keyboard.overlay" \) -print | sort | head -n 1)"

            if [[ -z "$dtsi_file" ]]; then
              echo "ERROR: physical layout source not found for $keyboard under ${{ inputs.layout_search_path }}" >&2
              error_occurred=1
              continue
            fi

            echo "INFO: drawing $keyboard from $dtsi_file"
            if python3 "$script" "$dtsi_file" "${{ inputs.output_folder }}/$keyboard.svg" --layout "layout_$keyboard" --keymap "$keymap"; then
              artifacts+=("${{ inputs.output_folder }}/$keyboard.svg")
            else
              echo "ERROR: drawing failed for $keyboard" >&2
              error_occurred=1
            fi
          done

          if [[ "$found" -eq 0 ]]; then
            echo "ERROR: no keymap files matched: ${{ inputs.keymap_patterns }}" >&2
            error_occurred=1
          fi

          joined_artifacts=$(printf '"%s", ' "${artifacts[@]}")
          printf 'artifacts=[%s]\n' "${joined_artifacts%, }" >> "$GITHUB_OUTPUT"

          if [[ "$error_occurred" -eq 1 ]]; then
            exit 1
          fi

      - name: Get last commit message
        id: last_commit_message
        if: inputs.amend_commit == true && (inputs.destination == 'commit' || inputs.destination == 'both')
        shell: bash
        run: echo "msg=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"

      - name: Commit keymap SVGs
        if: inputs.destination == 'commit' || inputs.destination == 'both'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: '${{ inputs.output_folder }}/*.svg'
          commit_message: '${{ (inputs.amend_commit == true && steps.last_commit_message.outputs.msg) || inputs.commit_message }}'
          commit_options: "${{ (inputs.amend_commit == true && '--amend --no-edit') || '' }}"
          push_options: "${{ (inputs.amend_commit == true && '--force-with-lease') || '' }}"
          skip_fetch: ${{ inputs.amend_commit == true }}

      - name: Artifact upload
        id: artifact-upload-step
        if: inputs.destination == 'artifact' || inputs.destination == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: '${{ inputs.artifact_name }}'
          path: |
            ${{ join(fromJSON(steps.draw.outputs.artifacts), ' ') }}
          if-no-files-found: error

      - name: Check job success
        if: ${{ !inputs.fail_on_error }}
        shell: bash
        run: |
          if [[ "${{ steps.draw.outcome }}" == "failure" ]]; then
            echo "The draw step failed for some keymaps, please check the logs above."
            exit 1
          fi
